# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────────────────
# CI/CD pipeline for the arXiv RAG Assistant
#
# Triggers:
#   - push to main          → full pipeline (lint + test + build + push to ACR)
#   - pull request to main  → lint + test only (no push)
#
# Secrets needed in GitHub repo settings:
#   AZURE_STORAGE_CONN_STR    — from Azure Portal → Storage → Access Keys
#   AZURE_SEARCH_ENDPOINT     — from Azure Portal → AI Search → Overview
#   AZURE_SEARCH_KEY          — from Azure Portal → AI Search → Keys
#   OPENAI_API_KEY            — from platform.openai.com/api-keys
#   ACR_LOGIN_SERVER          — e.g. arxivragacr.azurecr.io
#   ACR_USERNAME              — from Azure Portal → ACR → Access Keys
#   ACR_PASSWORD              — from Azure Portal → ACR → Access Keys

name: CI/CD — arXiv RAG Assistant

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: arxiv-rag-api
  PYTHON_VERSION: "3.11"

jobs:

  # ── Job 1: lint + unit tests ───────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check . --ignore E501

      - name: Run unit tests
        env:
          AZURE_STORAGE_CONN_STR: ${{ secrets.AZURE_STORAGE_CONN_STR }}
          AZURE_SEARCH_ENDPOINT:  ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_KEY:       ${{ secrets.AZURE_SEARCH_KEY }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
        run: pytest tests/ -v --tb=short

  # ── Job 2: build + push Docker image to ACR ───────────────────────────────
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: test                       # only runs if test job passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "full=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.tag.outputs.full }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push to ACR
        run: |
          docker push ${{ steps.tag.outputs.full }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Output image details
        run: |
          echo "✓ Image pushed: ${{ steps.tag.outputs.full }}"
          echo "✓ Also tagged as: latest"